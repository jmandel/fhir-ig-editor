# Build the static FHIR IG Editor and deploy to GitHub Pages (spec §8).
#
# The engine that ships is EXACTLY the pinned vendor/sushi-rs commit; the default
# IG is EXACTLY the pinned vendor/cycle commit. Bumping a submodule is the upgrade
# event. CI runs the engine's own fast gates before deploying — the demo never
# ships an engine that fails its own tests (spec §8 step 2, §9).
#
# Package acquisition: CI downloads the pinned closure (scripts/packages.list)
# from the FHIR package registry into .fhir-cache, wrapped in actions/cache keyed
# on the list — one download per closure change, hermetic otherwise. The whole
# path (fetch → bundle → native build → byte-check) is also runnable locally:
#   FHIR_CACHE=/tmp/c scripts/fetch-packages.sh && FHIR_CACHE=/tmp/c scripts/bundle-packages.sh

name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vendor/sushi-rs/target
          key: cargo-${{ runner.os }}-${{ hashFiles('vendor/sushi-rs/Cargo.lock') }}

      # --- Engine gate: the demo never deploys an engine that fails its own tests.
      # Fast subset per spec §8 step 2 (full suite is heavy; this is the ladder +
      # in-memory compile-equivalence + wasm_api). Widen as CI budget allows.
      - name: Engine gate (fast tests)
        working-directory: vendor/sushi-rs
        run: |
          cargo test -p compiler -p wasm_api -p snapshot_gen --release
          # SiteBuild's closed-artifact law and its optional site.db projection
          # are not reached by the legacy compile/snapshot packages above.
          cargo test -p site_build --features site-db-compat --release
          # Typed fragment resolution/read-set behavior is renderer-owned.
          cargo test -p render_page --release
          # Fig's ordinary tests are hermetic and include the native typed
          # artifact read-set and dirty-cone/watch behavior.
          cargo test -p fig --release

      - name: Install wasm-bindgen-cli (version-matched)
        run: |
          VER=$(grep -A1 'name = "wasm-bindgen"' vendor/sushi-rs/Cargo.lock | grep version | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "wasm-bindgen $VER"
          cargo install wasm-bindgen-cli --version "$VER" --locked

      # Pinned binaryen release — NOT apt. The runner's apt ships binaryen 108,
      # whose wasm-opt corrupts wasm-bindgen's externref table (the module then
      # dies at init with "Table.grow(): failed to grow table by 4" in the
      # browser; found on the first live deploy). 117 is verified against this
      # exact module in headless Chromium; build-wasm.sh also refuses wasm-opt
      # older than 116 as a backstop.
      - name: Install binaryen (wasm-opt, pinned release)
        run: |
          curl -fsSL https://github.com/WebAssembly/binaryen/releases/download/version_117/binaryen-version_117-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_117/bin" >> "$GITHUB_PATH"

      # --- FHIR package cache: the pinned closure (scripts/packages.list, which
      # documents WHY each package incl. r5.core) is downloaded once from the
      # FHIR package registry and cached by actions/cache keyed on the list, so
      # repeat runs don't re-download (~240 MB). This is CI's only registry
      # traffic; no live tx server is ever called (spec §6 tier 3 / §8 step 5).
      - name: Restore FHIR package cache
        uses: actions/cache@v4
        with:
          path: .fhir-cache
          key: fhir-packages-${{ hashFiles('scripts/packages.list') }}

      - name: Fetch FHIR packages (no-op on cache hit)
        env:
          FHIR_CACHE: ${{ github.workspace }}/.fhir-cache
        run: bash scripts/fetch-packages.sh

      - name: Build native CLIs (bundle/oracle + closed external builds)
        working-directory: vendor/sushi-rs
        run: cargo build --release -p rust_sushi -p fig

      # --- Lockfile un-handing (task #32 gate v): scripts/packages.list is
      # GENERATED by the native resolver over the baked IG config. This drift gate
      # fails CI if the committed list diverges from the resolver output, so a
      # cycle dependency change or an engine resolution change forces a deliberate
      # regeneration (scripts/gen-packages-list.sh) rather than silent staleness.
      - name: Package-list drift gate (resolver-generated)
        env:
          FHIR_CACHE: ${{ github.workspace }}/.fhir-cache
          RUST_SUSHI_BIN: ${{ github.workspace }}/vendor/sushi-rs/target/release/rust_sushi
        run: CHECK=1 bash scripts/gen-packages-list.sh

      # The engine's package-deps shim gate needs its separate eight-IG snapshot
      # corpus, not the deliberately smaller Pages package closure. Do not label
      # a missing-corpus conditional as a green gate: this job explicitly reports
      # that coverage as out of scope; run it in an engine corpus environment.
      - name: Package-deps shim parity — intentionally not run in Pages job
        run: echo "::notice title=Intentional coverage boundary::snapshot/package-deps-gate.sh requires the engine's eight-IG harness cache; Pages CI only assembles scripts/packages.list."

      - name: Build wasm engine
        env:
          FHIR_CACHE: ${{ github.workspace }}/.fhir-cache
        run: bash scripts/build-wasm.sh

      # Canonical app-data recipe shared with scripts/prepare-data.sh. This also
      # bakes every catalog IG, stages template/site/expansion artifacts and E2E
      # fixtures, and copies Cycle assets; CI must not carry a second recipe.
      - name: Assemble static app data
        env:
          FHIR_CACHE: ${{ github.workspace }}/.fhir-cache
        run: bash scripts/assemble-static-data.sh

      # --- Drift gate: wasm output byte-matches native for the whole cycle IG.
      - name: Byte-match gate (wasm vs native)
        working-directory: vendor/sushi-rs
        run: |
          rm -rf "$GITHUB_WORKSPACE/.native-out"
          FHIR_CACHE="$GITHUB_WORKSPACE/.fhir-cache" \
            ./target/release/rust_sushi build "$GITHUB_WORKSPACE/vendor/cycle" -o "$GITHUB_WORKSPACE/.native-out"
          # nodejs-target wasm for the headless byte-check.
          wasm-bindgen --target nodejs --out-dir "$GITHUB_WORKSPACE/.pkg-node" --out-name wasm_api \
            target/wasm32-unknown-unknown/release/wasm_api.wasm
          cd "$GITHUB_WORKSPACE"
          node scripts/byte-check.mjs .pkg-node app/public/data/bundles vendor/cycle .native-out/fsh-generated/resources

      # --- Template-parity gate (#40): the LIVE mountTemplate tree == the packed
      # `fig` warm-start artifact (both from the ONE loader) — "pages rendered via
      # the live-mounted template == the packed-artifact path". Uses the nodejs
      # wasm from the byte-check step + the repacked template chain bundles.
      - name: Template-parity gate (live mountTemplate == packed artifact)
        run: |
          node scripts/template-parity.mjs .pkg-node app/public/data/bundles \
            "site-bundles/templates/hl7.fhir.template/1.0.0.json"

      # --- Consistency gate: the in-engine tier-1 expander (expand_enumerable)
      # must agree with the committed expansion cache on the shared domain
      # (spec §6 tier 3). This cycle's committed cache is EMPTY, so the gate is
      # trivially green over it — but it is WIRED and proven by a fixture-based
      # self-test (an agreeing case AND a deliberately-wrong case the gate must
      # reject), so a green result means the machinery genuinely compares. CI
      # never calls a tx server (hermetic).
      - name: Consistency gate (expand_enumerable ↔ committed cache)
        run: node scripts/consistency-gate.mjs "$GITHUB_WORKSPACE/.pkg-node"

      - name: Setup Bun (the committed lockfile is bun.lock)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install app dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Install Cycle renderer dependencies
        working-directory: vendor/cycle
        run: bun install --frozen-lockfile

      - name: Cycle shared renderer contract tests
        working-directory: vendor/cycle
        run: |
          bun run typecheck:renderer
          SITE_GEN_USE_FIXTURE=1 bun site-gen/ingest.ts
          bun test

      # Exercise the actual portable native seam, not only its synthetic handle
      # tests. Archive the pinned Cycle source into a disposable tree so its
      # guide-specific example preprocessor cannot dirty the submodule checkout.
      - name: Cycle closed Fig v1/v2 integration and output parity
        working-directory: vendor/cycle
        env:
          FHIR_CACHE: ${{ github.workspace }}/.fhir-cache
          FIG_BIN: ${{ github.workspace }}/vendor/sushi-rs/target/release/fig
        run: |
          WORK="$(mktemp -d)"
          trap 'rm -rf "$WORK"' EXIT
          mkdir -p "$WORK/ig/input/resources"
          git archive HEAD | tar -x -C "$WORK/ig"
          EXAMPLE_OUT="$WORK/ig/input/resources/Bundle-period-tracking-longitudinal-example.json" \
            bun "$WORK/ig/scripts/gen-example.ts"
          SOURCE_DATE_EPOCH=1783555200 "$FIG_BIN" prepare "$WORK/ig" \
            --target cycle-site/v1 \
            --sushi-out "$WORK/fig-sushi-v1" \
            --cache "$FHIR_CACHE" \
            --out "$WORK/closed-v1"
          SOURCE_DATE_EPOCH=1783555200 "$FIG_BIN" prepare "$WORK/ig" \
            --target cycle-site/v2 \
            --sushi-out "$WORK/fig-sushi-v2" \
            --cache "$FHIR_CACHE" \
            --out "$WORK/closed-v2"
          OUT_DIR="$WORK/out-v1" SITE_BUILD_DIR="$WORK/closed-v1" bun site-gen/build.tsx
          OUT_DIR="$WORK/out-v2" SITE_BUILD_DIR="$WORK/closed-v2" bun site-gen/build.tsx
          V1_RECEIPT="$(bun -e 'console.log(JSON.parse(await Bun.file(process.argv[1]).text()).outputBuildId)' "$WORK/out-v1/cycle-output-receipt.json")"
          V2_RECEIPT="$(bun -e 'console.log(JSON.parse(await Bun.file(process.argv[1]).text()).outputBuildId)' "$WORK/out-v2/cycle-output-receipt.json")"
          test "$V1_RECEIPT" != "$V2_RECEIPT"
          rm "$WORK/out-v1/cycle-output-receipt.json" "$WORK/out-v2/cycle-output-receipt.json"
          diff -ru "$WORK/out-v1" "$WORK/out-v2"

      - name: App data-contract tests
        working-directory: app
        run: bun test tests

      - name: Build SPA
        working-directory: app
        env:
          # Project Pages serve under /<repo>/; user/org Pages use '/'.
          BASE_PATH: /${{ github.event.repository.name }}/
        run: bun run build

      - name: Install Chrome for browser gates
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-dependencies: true

      # Fresh browser profile + exact built artifact. The E2E includes the US
      # Core preview runtime-closure law: zero missing/HTML-fallback same-origin
      # assets, zero broken images, required table globals present, and no
      # unexpected uncaught browser exceptions.
      - name: Headless Chromium E2E + preview runtime closure
        timeout-minutes: 15
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
          # setup-chrome's archive exposes a SUID helper that is not root-owned
          # or mode 4755 on hosted runners. This is an isolated fresh-profile
          # test of our loopback static artifact, so opt out explicitly here.
          CHROME_NO_SANDBOX: '1'
        run: bash scripts/run-browser-gates.sh app/dist

      - name: Assemble Pages artifact
        run: |
          # public/ (pkg + data) is copied into dist by Vite; ensure it is present.
          test -f app/dist/pkg/wasm_api_bg.wasm
          test -f app/dist/data/cycle/manifest.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

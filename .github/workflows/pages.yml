# Build the static FHIR IG Editor and deploy to GitHub Pages (spec §8).
#
# The engine that ships is EXACTLY the pinned vendor/sushi-rs commit; the default
# IG is EXACTLY the pinned vendor/cycle commit. Bumping a submodule is the upgrade
# event. CI runs the engine's own fast gates before deploying — the demo never
# ships an engine that fails its own tests (spec §8 step 2, §9).
#
# Package acquisition: CI downloads the pinned closure (scripts/packages.list)
# from the FHIR package registry into .fhir-cache, wrapped in actions/cache keyed
# on the list — one download per closure change, hermetic otherwise. The whole
# path (fetch → bundle → native build → byte-check) is also runnable locally:
#   FHIR_CACHE=/tmp/c scripts/fetch-packages.sh && FHIR_CACHE=/tmp/c scripts/bundle-packages.sh

name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vendor/sushi-rs/target
          key: cargo-${{ runner.os }}-${{ hashFiles('vendor/sushi-rs/Cargo.lock') }}

      # --- Engine gate: the demo never deploys an engine that fails its own tests.
      # Fast subset per spec §8 step 2 (full suite is heavy; this is the ladder +
      # in-memory compile-equivalence + wasm_api). Widen as CI budget allows.
      - name: Engine gate (fast tests)
        working-directory: vendor/sushi-rs
        run: cargo test -p compiler -p wasm_api -p snapshot_gen --release

      - name: Install wasm-bindgen-cli (version-matched)
        run: |
          VER=$(grep -A1 'name = "wasm-bindgen"' vendor/sushi-rs/Cargo.lock | grep version | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "wasm-bindgen $VER"
          cargo install wasm-bindgen-cli --version "$VER" --locked

      # Pinned binaryen release — NOT apt. The runner's apt ships binaryen 108,
      # whose wasm-opt corrupts wasm-bindgen's externref table (the module then
      # dies at init with "Table.grow(): failed to grow table by 4" in the
      # browser; found on the first live deploy). 117 is verified against this
      # exact module in headless Chromium; build-wasm.sh also refuses wasm-opt
      # older than 116 as a backstop.
      - name: Install binaryen (wasm-opt, pinned release)
        run: |
          curl -fsSL https://github.com/WebAssembly/binaryen/releases/download/version_117/binaryen-version_117-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_117/bin" >> "$GITHUB_PATH"

      # --- FHIR package cache: the pinned closure (scripts/packages.list, which
      # documents WHY each package incl. r5.core) is downloaded once from the
      # FHIR package registry and cached by actions/cache keyed on the list, so
      # repeat runs don't re-download (~240 MB). This is CI's only registry
      # traffic; no live tx server is ever called (spec §6 tier 3 / §8 step 5).
      - name: Restore FHIR package cache
        uses: actions/cache@v4
        with:
          path: .fhir-cache
          key: fhir-packages-${{ hashFiles('scripts/packages.list') }}

      - name: Fetch FHIR packages (no-op on cache hit)
        env:
          FHIR_CACHE: ${{ github.workspace }}/.fhir-cache
        run: bash scripts/fetch-packages.sh

      - name: Build rust_sushi (bundle CLI + native oracle)
        working-directory: vendor/sushi-rs
        run: cargo build --release -p rust_sushi

      - name: Build wasm engine
        env:
          FHIR_CACHE: ${{ github.workspace }}/.fhir-cache
        run: bash scripts/build-wasm.sh

      - name: Bundle packages + export IG manifest
        env:
          FHIR_CACHE: ${{ github.workspace }}/.fhir-cache
        run: |
          bash scripts/bundle-packages.sh
          node scripts/export-ig-manifest.mjs

      # --- Drift gate: wasm output byte-matches native for the whole cycle IG.
      - name: Byte-match gate (wasm vs native)
        working-directory: vendor/sushi-rs
        run: |
          rm -rf "$GITHUB_WORKSPACE/.native-out"
          FHIR_CACHE="$GITHUB_WORKSPACE/.fhir-cache" \
            ./target/release/rust_sushi build "$GITHUB_WORKSPACE/vendor/cycle" -o "$GITHUB_WORKSPACE/.native-out"
          # nodejs-target wasm for the headless byte-check.
          wasm-bindgen --target nodejs --out-dir "$GITHUB_WORKSPACE/.pkg-node" --out-name wasm_api \
            target/wasm32-unknown-unknown/release/wasm_api.wasm
          cd "$GITHUB_WORKSPACE"
          node scripts/byte-check.mjs .pkg-node app/public/data/bundles vendor/cycle .native-out/fsh-generated/resources

      - name: Setup Bun (the committed lockfile is bun.lock)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build SPA
        working-directory: app
        env:
          # Project Pages serve under /<repo>/; user/org Pages use '/'.
          BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Assemble Pages artifact
        run: |
          # public/ (pkg + data) is copied into dist by Vite; ensure it is present.
          test -f app/dist/pkg/wasm_api_bg.wasm
          test -f app/dist/data/cycle/manifest.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
